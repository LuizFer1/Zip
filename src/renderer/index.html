<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zip | Chat Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>

<body>
  <div class="app-shell">

    <!-- ── Rail ── -->
    <aside class="app-rail card" aria-label="Rail de navegação">
      <div class="brand-mark" aria-label="Zip">Z</div>

      <nav class="rail-nav" aria-label="Navegação principal">
        <button class="rail-button active" id="home-button" type="button" title="Home">
          <svg class="rail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" />
            <polyline points="9 21 9 12 15 12 15 21" />
          </svg>
          <span class="rail-label">Home</span>
        </button>

        <button class="rail-button" id="friends-button" type="button" title="Amigos">
          <svg class="rail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="9" cy="7" r="4" />
            <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            <path d="M21 21v-2a4 4 0 0 0-3-3.87" />
          </svg>
          <span class="rail-label">Amigos</span>
        </button>

        <button class="rail-button rail-button-accent" id="open-create-group" type="button" title="Criar grupo">
          <svg class="rail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
          <span class="rail-label">Criar</span>
        </button>
      </nav>

      <button class="rail-profile" id="profile-trigger" type="button" aria-label="Perfil">
        LF
      </button>
    </aside>

    <!-- ── Workspace Sidebar ── -->
    <aside class="workspace-sidebar card" aria-label="Sidebar de grupos e amigos">
      <header class="workspace-header">
        <div>
          <p class="eyebrow">home</p>
          <h1>Zip Chat</h1>
        </div>
        <button class="ghost-button" id="create-group-inline" type="button">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" aria-hidden="true" style="margin-right:4px;vertical-align:-1px">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Grupo
        </button>
      </header>

      <section class="panel-block" id="group-panel">
        <div class="panel-title-row">
          <h2>
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" aria-hidden="true" style="margin-right:5px;vertical-align:-1px;opacity:0.7">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            Grupos
          </h2>
          <span class="count-pill" id="group-count">0</span>
        </div>
        <ul class="entity-list" id="group-list"></ul>
      </section>

      <section class="panel-block" id="friend-panel">
        <div class="panel-title-row">
          <h2>
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" aria-hidden="true" style="margin-right:5px;vertical-align:-1px;opacity:0.7">
              <circle cx="9" cy="7" r="4" />
              <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
            </svg>
            Amigos
          </h2>
          <span class="count-pill" id="friend-count">0</span>
        </div>
        <ul class="entity-list" id="friend-list"></ul>
      </section>

      <section class="profile-card" id="profile-card">
        <div class="avatar avatar-large" id="profile-avatar">LF</div>
        <div class="profile-copy">
          <p class="profile-name" id="profile-name">Luiz Fernando</p>
          <p class="profile-handle" id="profile-handle">@luizf</p>
        </div>
        <span class="status-pill" id="profile-status">Online</span>
      </section>
    </aside>

    <!-- ── Chat View ── -->
    <main class="chat-view card" aria-label="Área principal de chat">
      <header class="chat-header">
        <div>
          <p class="eyebrow" id="chat-context">grupo</p>
          <h2 id="chat-title">#geral</h2>
          <p class="chat-subtitle" id="chat-subtitle">Canal principal</p>
        </div>

        <div class="chat-tools">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input id="chat-search" type="search" placeholder="Buscar mensagens" />
          </div>
        </div>
      </header>

      <section class="message-list" id="message-list" aria-live="polite"></section>

      <form class="message-form" id="message-form">
        <button class="attach-button" type="button" aria-label="Adicionar anexo">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <input id="message-input" type="text" placeholder="Escreva uma mensagem…" autocomplete="off" required />
        <button class="send-button" type="submit">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
            style="margin-right:6px;vertical-align:-2px">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
          Enviar
        </button>
      </form>
    </main>

    <!-- ── Group Members ── -->
    <aside class="group-members card" aria-label="Pessoas do grupo">
      <header class="panel-title-row">
        <h2 id="participants-title">Pessoas do grupo</h2>
        <span class="count-pill" id="participant-count">0</span>
      </header>
      <ul class="participant-list" id="participant-list"></ul>
    </aside>
  </div>

  <!-- ── Dialog ── -->
  <dialog id="create-group-dialog">
    <form class="dialog-panel" id="create-group-form" method="dialog">
      <div class="dialog-header">
        <div class="dialog-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div>
          <h3>Criar novo grupo</h3>
          <p>Defina um nome e uma descrição curta para iniciar.</p>
        </div>
      </div>

      <label for="group-name">Nome do grupo</label>
      <input id="group-name" type="text" maxlength="26" placeholder="ex: design-team" required />

      <label for="group-description">Descrição</label>
      <textarea id="group-description" rows="3" maxlength="120" placeholder="Sobre o que é esse grupo?"
        required></textarea>

      <div class="dialog-actions">
        <button type="button" class="dialog-cancel" id="cancel-create-group">Cancelar</button>
        <button type="submit" class="dialog-submit">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" aria-hidden="true" style="margin-right:5px;vertical-align:-1px">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Criar grupo
        </button>
      </div>
    </form>
  </dialog>

  <script src="../../dist/renderer/js/app.js"></script>
</body>

</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zip Chat</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Zip Chat</h1>
        <p id="profile-label">Sem identidade</p>
      </div>
      <div class="topbar-right">
        <span id="connection-status" class="status-badge offline">Desconectado</span>
        <button id="connect-button" type="button">Conectar</button>
        <button id="disconnect-button" type="button">Desconectar</button>
      </div>
    </header>

    <section id="identity-panel" class="panel">
      <h2>Identidade</h2>
      <form id="identity-form" class="identity-form">
        <input id="identity-input" type="text" maxlength="32" placeholder="Seu nome" required />
        <button type="submit">Criar identidade</button>
      </form>
    </section>

    <section class="panel channel-panel">
      <label for="channel-id">Canal</label>
      <input id="channel-id" type="text" value="geral" readonly />
    </section>

    <main class="chat panel">
      <div id="message-list" class="message-list"></div>
      <form id="message-form" class="message-form">
        <input id="message-input" type="text" placeholder="Digite sua mensagem..." autocomplete="off" required />
        <button id="send-button" type="submit">Enviar</button>
      </form>
    </main>
  </div>

  <script src="../../dist/renderer/js/app.js"></script>
</body>
</html>
